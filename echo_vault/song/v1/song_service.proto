syntax = "proto3";

package echo_vault.song.v1;

option go_package = "github.com/ink/echovault-server/api/grpc/generated/echo_vault/song/v1;songpb";

import "google/protobuf/timestamp.proto";
import "echo_vault/common/v1/types.proto";

// ==========================================
// 歌曲服务
// ==========================================
service SongService {
  // 批量查询 hash → 获取服务端已有的歌曲信息
  rpc CheckSongsByHash(CheckSongsByHashRequest) returns (CheckSongsByHashResponse);

  // 发布新歌曲
  rpc PublishSong(PublishSongRequest) returns (PublishSongResponse);

  // 更新歌曲元数据
  rpc UpdateSong(UpdateSongRequest) returns (UpdateSongResponse);

  // 删除歌曲
  rpc DeleteSong(DeleteSongRequest) returns (DeleteSongResponse);

  // 获取歌曲详情
  rpc GetSong(GetSongRequest) returns (GetSongResponse);

  // 获取歌曲列表（支持分页）
  rpc ListSongs(ListSongsRequest) returns (ListSongsResponse);

  // 搜索歌曲
  rpc SearchSongs(SearchSongsRequest) returns (SearchSongsResponse);

  // 获取某个设备上的本地歌曲
  rpc ListDeviceLocalSongs(ListDeviceLocalSongsRequest) returns (ListDeviceLocalSongsResponse);
}

// ==========================================
// 消息定义
// ==========================================

// 歌曲
message Song {
  string id = 1;
  string title = 2;
  string artist = 3;
  string album = 4;
  string genre = 5;
  int32 track_number = 6;
  int32 disc_number = 7;
  int32 duration_ms = 8;
  int32 year = 9;
  string file_name = 10;
  int64 file_size = 11;
  string file_hash = 12;           // SHA256
  string mime_type = 13;
  int32 bitrate = 14;
  int32 sample_rate = 15;
  echo_vault.common.v1.FileSource source = 16;
  echo_vault.common.v1.FileStatus file_status = 17;
  string owner_id = 18;
  int64 version = 19;              // 同步版本号
  bool is_deleted = 20;
  google.protobuf.Timestamp created_at = 21;
  google.protobuf.Timestamp updated_at = 22;
  string cover_url = 23;           // REST 封面下载地址
  string audio_url = 24;           // REST 音频下载地址
}

message CheckSongsByHashRequest {
  string device_id = 1;
  repeated string file_hashes = 2;    // 批量查询 SHA256
}

message CheckSongsByHashResponse {
  message Result {
    string file_hash = 1;
    bool exists = 2;                  // 服务端是否已有
    Song song = 3;                    // exists=true 时返回完整歌曲信息
  }
  repeated Result results = 1;
}

message PublishSongRequest {
  string file_hash = 1;
  string title = 2;
  string artist = 3;
  string album = 4;
  string genre = 5;
  int32 track_number = 6;
  int32 disc_number = 7;
  int32 year = 8;
  string file_name = 9;
  int64 file_size = 10;
  string mime_type = 11;
}

message PublishSongResponse {
  Song song = 1;
}

message UpdateSongRequest {
  string id = 1;
  string title = 2;
  string artist = 3;
  string album = 4;
  string genre = 5;
  int32 track_number = 6;
  int32 disc_number = 7;
  int32 year = 8;
}

message UpdateSongResponse {
  Song song = 1;
}

message DeleteSongRequest {
  string id = 1;
}

message DeleteSongResponse {}

message GetSongRequest {
  string id = 1;
}

message GetSongResponse {
  Song song = 1;
}

message ListSongsRequest {
  echo_vault.common.v1.PaginationRequest pagination = 1;
  string owner_id = 2;
  string sort_by = 3;                // "title" | "artist" | "created_at"
  string sort_order = 4;             // "asc" | "desc"
}

message ListSongsResponse {
  repeated Song songs = 1;
  echo_vault.common.v1.PaginationResponse pagination = 2;
}

message SearchSongsRequest {
  string query = 1;
  echo_vault.common.v1.PaginationRequest pagination = 2;
}

message SearchSongsResponse {
  repeated Song songs = 1;
  echo_vault.common.v1.PaginationResponse pagination = 2;
}

message ListDeviceLocalSongsRequest {
  string device_id = 1;
}

message ListDeviceLocalSongsResponse {
  repeated Song songs = 1;
}
