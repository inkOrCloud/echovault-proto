syntax = "proto3";

package echo_vault.user.v1;

option go_package = "github.com/ink/echovault-server/api/grpc/generated/echo_vault/user/v1;userpb";

import "google/protobuf/timestamp.proto";

// ==========================================
// 用户服务
// ==========================================
service UserService {
  // 注册（第一个用户自动成为管理员）
  rpc Register(RegisterRequest) returns (RegisterResponse);

  // 登录
  rpc Login(LoginRequest) returns (LoginResponse);

  // 刷新 Token
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);

  // 获取当前用户信息
  rpc GetCurrentUser(GetCurrentUserRequest) returns (GetCurrentUserResponse);

  // 更新用户信息
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);

  // 获取服务器信息
  rpc GetServerInfo(GetServerInfoRequest) returns (GetServerInfoResponse);

  // 注册当前设备
  rpc RegisterDevice(RegisterDeviceRequest) returns (RegisterDeviceResponse);

  // 获取用户的所有设备
  rpc ListDevices(ListDevicesRequest) returns (ListDevicesResponse);

  // 移除设备
  rpc RemoveDevice(RemoveDeviceRequest) returns (RemoveDeviceResponse);

  // 更新设备信息
  rpc UpdateDevice(UpdateDeviceRequest) returns (UpdateDeviceResponse);
}

// ==========================================
// 消息定义
// ==========================================

// 用户
message User {
  string id = 1;
  string username = 2;
  string display_name = 3;
  string role = 4;                    // "admin" | "user"
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

// 设备
message Device {
  string device_id = 1;
  string device_name = 2;
  string platform = 3;                // "windows" | "macos" | "linux" | "android" | "ios" | "web"
  string os_version = 4;
  string client_version = 5;
  google.protobuf.Timestamp last_sync_at = 6;
  google.protobuf.Timestamp registered_at = 7;
}

message RegisterRequest {
  string username = 1;
  string password = 2;
  string display_name = 3;
}

message RegisterResponse {
  User user = 1;
  string access_token = 2;
  string refresh_token = 3;
}

message LoginRequest {
  string username = 1;
  string password = 2;
  string device_id = 3;
}

message LoginResponse {
  User user = 1;
  string access_token = 2;
  string refresh_token = 3;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message GetCurrentUserRequest {}

message GetCurrentUserResponse {
  User user = 1;
}

message UpdateUserRequest {
  string display_name = 1;
}

message UpdateUserResponse {
  User user = 1;
}

message GetServerInfoRequest {}

message GetServerInfoResponse {
  string version = 1;                  // 服务端版本号
  string name = 2;                     // 服务器名称
  int32 max_file_size_mb = 3;          // 上传大小限制
  repeated string supported_audio_formats = 4;
}

message RegisterDeviceRequest {
  string device_id = 1;
  string device_name = 2;
  string platform = 3;
  string os_version = 4;
  string client_version = 5;
}

message RegisterDeviceResponse {
  Device device = 1;
}

message ListDevicesRequest {}

message ListDevicesResponse {
  repeated Device devices = 1;
}

message RemoveDeviceRequest {
  string device_id = 1;
}

message RemoveDeviceResponse {}

message UpdateDeviceRequest {
  string device_id = 1;
  string device_name = 2;
}

message UpdateDeviceResponse {
  Device device = 1;
}
